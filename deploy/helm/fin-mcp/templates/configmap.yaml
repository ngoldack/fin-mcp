{{- $mcp := dict
    "access_mode" .Values.mcp.accessMode
    "transport" "sse"
    "port" (int .Values.mcp.port)
    "cache_ttl_minutes" (int .Values.mcp.cacheTTLMinutes)
    "log_format" .Values.mcp.logFormat
    "log_level" .Values.mcp.logLevel -}}
{{- $config := dict "providers" .Values.config.providers "mcp" $mcp -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fin-mcp.fullname" . }}
  labels:
    {{- include "fin-mcp.labels" . | nindent 4 }}
data:
  config.json: |
    {{- $config | toPrettyJson | nindent 4 }}
