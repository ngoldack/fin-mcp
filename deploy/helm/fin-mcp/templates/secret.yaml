{{- if not .Values.config.existingSecret }}
{{- $c := .Values.config.mcp -}}
{{- $mcp := dict
    "access_mode" $c.accessMode
    "transport" "sse"
    "port" (int $c.port)
    "log_format" $c.logFormat
    "log_level" $c.logLevel
    "cache_type" $c.cache.type
    "cache_ttl_minutes" (int $c.cache.ttlMinutes) -}}
{{- if $c.bearerToken }}{{- $_ := set $mcp "bearer_token" $c.bearerToken }}{{- end }}
{{- if eq $c.cache.type "valkey" }}
{{- $_ := set $mcp "cache_valkey_address" $c.cache.valkey.address }}
{{- $_ := set $mcp "cache_valkey_db" (int $c.cache.valkey.db) }}
{{- $_ := set $mcp "cache_valkey_tls" $c.cache.valkey.tls }}
{{- if $c.cache.valkey.username }}{{- $_ := set $mcp "cache_valkey_username" $c.cache.valkey.username }}{{- end }}
{{- if $c.cache.valkey.password }}{{- $_ := set $mcp "cache_valkey_password" $c.cache.valkey.password }}{{- end }}
{{- end }}
{{- $config := dict "providers" .Values.config.providers "mcp" $mcp -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fin-mcp.fullname" . }}
  labels:
    {{- include "fin-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.json: |
    {{- $config | toPrettyJson | nindent 4 }}
  {{- if .Values.privateKey.content }}
  private.key: |
    {{- .Values.privateKey.content | nindent 4 }}
  {{- end }}
{{- end }}
