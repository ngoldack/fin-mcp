{{- if or .Values.mcp.bearerToken .Values.privateKey.content }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fin-mcp.fullname" . }}
  labels:
    {{- include "fin-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.mcp.bearerToken }}
  bearer-token: {{ .Values.mcp.bearerToken | quote }}
  {{- end }}
  {{- if .Values.privateKey.content }}
  private.key: |
    {{- .Values.privateKey.content | nindent 4 }}
  {{- end }}
{{- end }}
