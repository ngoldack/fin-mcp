# Default values for fin-mcp.
# The chart deploys the MCP server over the SSE (HTTP) transport — the sensible
# choice for Kubernetes. Stdio is for local MCP clients, not a Deployment.

replicaCount: 1

image:
  # Single, unprivileged image. Observability is in-process via the OTel SDK.
  repository: ghcr.io/ngoldack/fin-mcp
  tag: latest
  pullPolicy: IfNotPresent

# OpenTelemetry (in-process Go SDK — traces + metrics over OTLP/HTTP).
# Set exporterEndpoint to your collector to enable telemetry; leave empty to
# disable it (zero overhead). No elevated privileges are required.
otel:
  exporterEndpoint: "" # e.g. http://otel-collector:4318
  serviceName: fin-mcp

# The ENTIRE config.json is treated as sensitive (it holds bank session IDs, the
# bearer token, and any cache secrets) and is rendered into a Kubernetes
# **Secret**, never a ConfigMap.
#
#   - PREFERRED (production): set config.existingSecret to a Secret you created
#     out-of-band, with a `config.json` key (and the private key inline via
#     `private_key_content`, or a `private.key` key — see deployment docs). The
#     config then never passes through Helm values, CI logs, or release history.
#   - Otherwise the chart renders config.json into its own Secret from the values
#     below (dev / GitOps-with-sealed-secrets).
config:
  existingSecret: "" # Secret with a `config.json` key (and optional `private.key`)

  # Provider topology. Connections are added out-of-band (they require SCA) and
  # belong in the Secret — keep them empty here and patch the Secret, or use
  # config.existingSecret.
  providers:
    - name: enable-banking
      type: enable-banking
      enable_banking:
        app_id: ""
        # Use an inline key (private_key_content) for the existingSecret path, or
        # mount a file at this path via privateKey.content for the chart path.
        private_key_path: /etc/fin-mcp/keys/private.key
        environment: SANDBOX
        # redirect_url is only needed for setup (SCA) and payment initiation.
        # Omit it for a read-only deployment with already-authorized sessions.
        redirect_url: ""
      connections: []

  mcp:
    accessMode: ReadOnly # ReadOnly | InternalOnly | Unrestricted
    port: 8090
    logFormat: json # text | json
    logLevel: info
    # Bearer token for SSE auth (sensitive — rendered into the Secret). Empty
    # disables auth; only safe on loopback. Always run behind TLS.
    bearerToken: ""
    cache:
      type: memory # none | memory | valkey
      ttlMinutes: 5
      # External Valkey/Redis only — this chart does NOT deploy a Valkey server.
      # Point address at your own instance. Cached account data is stored there;
      # use a password and TLS (the server warns at startup if either is missing).
      valkey:
        address: "" # host:port of your external valkey
        username: ""
        password: "" # sensitive; strongly recommended
        db: 0
        tls: false # set true when your valkey terminates TLS

# Enable Banking application private key (PEM). Rendered into the Secret and
# mounted at /etc/fin-mcp/keys/private.key. Leave empty when using
# config.existingSecret with an inline private_key_content.
privateKey:
  content: ""

service:
  type: ClusterIP
  port: 8090

resources: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
