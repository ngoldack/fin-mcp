name: CI & Secure Delivery Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write        # Required to push images to GHCR
  id-token: write        # CRITICAL: Required for Cosign keyless signing via OIDC!
  security-events: write # Required to upload Trivy SARIF reports

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'

jobs:
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pinned for reproducibility — avoids surprise failures from new checks in "latest".
          version: v2.12.2
          args: --timeout=5m

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run Tests with gotestsum
        run: |
          set -o pipefail
          gotestsum --junitfile junit-report.xml --format pkgname -- -race ./... 2>&1 | tee test-output.txt

      - name: Publish test summary
        if: always()
        run: |
          {
            echo "## 🧪 Test Results"
            echo ""
            echo '```'
            tail -n 40 test-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload JUnit Test Results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: junit-test-results
          path: junit-report.xml

  build-and-deliver:
    name: Secure Build & Deliver
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: standard-runtime
            suffix: standard
          - target: instrumented-runtime
            suffix: otel
    env:
      REGISTRY: ghcr.io
      IMAGE_BASE: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build a local (loadable) image so Trivy can scan it on EVERY event.
      #    Attestations are omitted here (an OCI index cannot be loaded locally).
      - name: Build ${{ matrix.suffix }} image (local, for scanning)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          load: true
          tags: fin-mcp-${{ matrix.suffix }}:scan
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

      - name: Scan ${{ matrix.suffix }} image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: fin-mcp-${{ matrix.suffix }}:scan
          format: sarif
          output: trivy-${{ matrix.suffix }}.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload ${{ matrix.suffix }} Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.suffix }}.sarif
          category: trivy-${{ matrix.suffix }}

      # 2. On main: build + push WITH SBOM/SLSA attestations, then Cosign-sign by digest.
      - name: Build & push ${{ matrix.suffix }} image (attestations)
        id: build-push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/${{ matrix.suffix }}:latest
            ${{ env.IMAGE_BASE }}/${{ matrix.suffix }}:${{ github.sha }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.suffix }}

      - name: Sign ${{ matrix.suffix }} image & attestations (Cosign)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cosign sign --yes "${{ env.IMAGE_BASE }}/${{ matrix.suffix }}@${{ steps.build-push.outputs.digest }}"
